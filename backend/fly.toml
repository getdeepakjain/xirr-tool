# Fly.io config for the FastAPI backend (run `fly deploy` from the backend/ dir).
# Free allowance includes small volumes, so SQLite persists across restarts.
app = "xirr-backend"          # change to your unique app name
primary_region = "sin"        # pick a region near you (e.g. sin, bom, ord, fra)

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  DATABASE_URL = "sqlite:////data/portfolio.sqlite3"
  # Set the rest as SECRETS, not here:
  #   fly secrets set SECRET_KEY=... FRONTEND_ORIGINS=... FRONTEND_URL=... \
  #                   BACKEND_BASE_URL=... GOOGLE_CLIENT_ID=... GOOGLE_CLIENT_SECRET=...

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    method = "GET"
    path = "/api/health"
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"

# Persistent volume for the SQLite database.
# Create it once with: fly volumes create xirr_data --size 1 --region <same region>
[[mounts]]
  source = "xirr_data"
  destination = "/data"
