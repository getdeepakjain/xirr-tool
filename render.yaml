# Render Blueprint for the FastAPI backend.
# Deploy: push to GitHub, then in Render choose "New +" -> "Blueprint" and pick this repo.
#
# NOTE: Persistent disks (the `disk:` block below) require a paid instance
# (Starter or higher). On Render's FREE tier, remove the `disk:` block and use a
# managed Postgres instead — set DATABASE_URL to the Postgres connection string
# (postgresql+psycopg://...) and add "psycopg[binary]" to requirements.
services:
  - type: web
    name: xirr-backend
    env: python
    rootDir: backend
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "10080"
      - key: DATABASE_URL
        value: sqlite:////var/data/portfolio.sqlite3
      # Set these in the Render dashboard (they depend on your Vercel domain):
      - key: FRONTEND_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_BASE_URL
        sync: false
      # Optional Google OAuth:
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
